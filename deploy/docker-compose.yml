# Den — full stack. Run from repo root:
#   docker compose -f deploy/docker-compose.yml up -d --build
# Provide secrets via an .env file at the repo root (see .env.example).
#
# ⚠️ PERSISTENT DATA PATHS — read before changing a volume line below.
# Relative bind mounts resolve against THIS FILE'S directory, not the cwd.
# That is a trap on the prod host, which has two checkouts of this repo:
# the manual one (/opt/apps/den/repo) and the GitHub runner's workspace
# (/opt/actions-runner/den/_work/den/den). `name: den` pins the compose
# project, so both directories drive the SAME containers — but a plain
# `./pg-data` would mean each one bind-mounts a DIFFERENT host directory.
# A deploy from the runner would therefore recreate den-postgres-1 against
# an empty data dir: prod would look like it had lost every user, message
# and invite, while the real data sat untouched at the other path.
#
# DEN_DATA_ROOT decouples the data location from whichever checkout ran the
# command. It comes from the --env-file, which BOTH deploy paths already
# share (/opt/apps/den/secrets/.env), so setting it once fixes both.
# Unset/empty → '.', i.e. exactly the old behaviour, which is what local dev
# wants. See deploy/.env.prod.example and deploy/README.md.

name: den

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-den}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-den}
      POSTGRES_DB: ${POSTGRES_DB:-den}
    volumes:
      - ${DEN_DATA_ROOT:-.}/pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-den} -d ${POSTGRES_DB:-den}']
      interval: 10s
      timeout: 5s
      retries: 5
    # The api service reaches this over the compose network. We also publish it
    # bound to LOCALHOST ONLY (never 0.0.0.0 — honours §10 "DB not exposed
    # publicly") so host-side dev tooling (drizzle-kit migrate, psql) and
    # debugging can reach it. Override POSTGRES_HOST_PORT if 5432 is taken.
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'

  # Local/dev-only stand-in for Cloudflare R2 (S3-compatible API). Prod points
  # R2_ENDPOINT at the real R2 account endpoint instead — same client code,
  # zero code changes (see server/src/media/r2.ts). `profiles: [dev]` means a
  # plain `docker compose up` (prod, and the CI deploy workflow) never starts
  # this — it only comes up when explicitly requested with `--profile dev`.
  # § BACKBONE 3 still names R2 as the real media store.
  minio:
    image: minio/minio:latest
    profiles: [dev]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY_ID:-den-dev}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_ACCESS_KEY:-den-dev-secret}
    volumes:
      - ${DEN_DATA_ROOT:-.}/minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Deliberately NOT `${NODE_ENV:-production}` — .env's NODE_ENV is set to
      # 'development' for the host `npm run dev` workflow, and this image only
      # installs prod deps (no pino-pretty), so inheriting that value here
      # crash-loops the container. Use the separate API_NODE_ENV to opt into
      # non-Secure cookies for local docker testing (`API_NODE_ENV=development`).
      NODE_ENV: ${API_NODE_ENV:-production}
      API_HOST: 0.0.0.0
      API_PORT: '3000'
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-https://den.ems-place.com}
      DATABASE_URL: postgres://${POSTGRES_USER:-den}:${POSTGRES_PASSWORD:-den}@postgres:5432/${POSTGRES_DB:-den}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      # No domain-specific fallback: an unset/empty COOKIE_DOMAIN gives a
      # host-only cookie, which is what local dev needs. Real prod .env always
      # sets this explicitly (see .env.example), so production is unaffected.
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@ems-place.com}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-den-dev}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-den-dev-secret}
      R2_BUCKET: ${R2_BUCKET:-den-media}
      # Same trap as NODE_ENV above: .env's R2_ENDPOINT is set to
      # localhost:9000 for the host `npm run dev` workflow, which is
      # unreachable from inside this container. API_R2_ENDPOINT is a
      # docker-only override so the container always defaults to the
      # in-network `minio` service hostname regardless of what .env says.
      R2_ENDPOINT: ${API_R2_ENDPOINT:-http://minio:9000}
      # Same docker-only-override pattern, and for a sharper reason than the
      # NODE_ENV/R2_ENDPOINT cases above: `${R2_PUBLIC_ENDPOINT:-default}`
      # (single var, `:-`) can't tell "unset" apart from "deliberately empty"
      # — a real prod .env's intentionally-blank R2_PUBLIC_ENDPOINT (see
      # r2.ts: empty means "no rewrite, r2Endpoint is already public") was
      # silently getting replaced by the MinIO-era localhost:9000 default,
      # which broke every presigned URL in prod. A distinct override var
      # sidesteps the ambiguity entirely: unset in prod's .env → truly empty
      # in the container. Only set API_R2_PUBLIC_ENDPOINT=http://localhost:9000
      # if you're testing the full stack (api included) inside Docker
      # locally against the dev MinIO stand-in.
      R2_PUBLIC_ENDPOINT: ${API_R2_PUBLIC_ENDPOINT:-}
      R2_FORCE_PATH_STYLE: ${R2_FORCE_PATH_STYLE:-true}
    # Bound to localhost only (same pattern as postgres above) — lets the
    # Vite dev server's proxy (app/vite.config.ts, default target
    # localhost:3000) reach this container directly for local testing. Not
    # needed in a pure prod deploy (Caddy reaches this over the internal
    # compose network as `api:3000` regardless), but harmless to publish
    # unless the host port collides with something else — override
    # API_HOST_PORT in .env on a shared host where 3000 is already taken.
    ports:
      - '127.0.0.1:${API_HOST_PORT:-3000}:3000'

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    # 443 deliberately not published: Caddy runs plain-HTTP-only here (see
    # deploy/Caddyfile) since TLS terminates upstream at the VPS reverse
    # proxy, which forwards decrypted HTTP through the frp tunnel to :80.
    ports:
      - '80:80'
    volumes:
      - ${DEN_DATA_ROOT:-.}/caddy-data:/data
      - ${DEN_DATA_ROOT:-.}/caddy-config:/config

name: Deploy

# Runs on the home-server self-hosted runner itself — the job's shell commands
# execute directly on that machine, no SSH step needed. See deploy/README.md
# "CI/CD — self-hosted runner" for one-time runner setup on the host.
on:
  push:
    branches: [main]
  # Manual trigger from the Actions tab. Use this instead of "Re-run jobs" on
  # an old failed run: a re-run replays the ORIGINAL commit, so it will not
  # pick up fixes that landed on main since — which looks exactly like the fix
  # not working. workflow_dispatch always runs the tip of the chosen branch.
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          # Default actions/checkout behavior runs `git clean -ffdx` before
          # checkout, which would delete the untracked .env this job depends
          # on if it lived inside the repo. It doesn't — see ENV_FILE below —
          # but `clean: false` is kept anyway as a second line of defense so
          # a future stray untracked file in the workspace is never silently
          # wiped by a deploy.
          clean: false

      # Everything the deploy does lives in deploy/deploy.sh — preflight
      # guards, build, migrations, prune. CI and a human on the box run the
      # SAME script, so the two paths can't silently drift apart again (they
      # did once: manual deploys kept working while every CI deploy failed).
      # Fixes and new steps land in one place and apply to both.
      #
      # Called via `bash` rather than `./deploy/deploy.sh`: the repo is
      # authored on Windows, which can't set the POSIX exec bit. The bit is
      # stored in git anyway, but this makes it non-load-bearing.
      - name: Deploy
        env:
          # Lives outside the repo checkout entirely (see runner setup docs) —
          # never touched by git clean, never in the git history.
          DEN_ENV_FILE: ${{ vars.DEN_ENV_FILE || '/opt/apps/den/secrets/.env' }}
        run: bash deploy/deploy.sh
